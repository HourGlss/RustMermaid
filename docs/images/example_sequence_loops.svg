<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="479" height="602" viewBox="-50 -10 479 602" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.edge-label-bg {
  fill: rgba(232, 232, 232, 0.8);
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.sequence-title {
  fill: #333333;
}

.actor {
  stroke: #9370DB;
  fill: #ECECFF;
}

.actor-box {
  stroke: #9370DB;
  fill: #ECECFF;
}

/* Actor text - no stroke (avoid outlined appearance) */
text.actor, text.actor > tspan, text.actor-box, text.actor-label {
  fill: #333333;
  stroke: none;
}

.actor-line {
  stroke: #999999;
  stroke-width: 0.5px;
}

.messageLine0 {
  stroke-width: 1.5;
  stroke-dasharray: none;
  stroke: #333333;
}

.messageLine1 {
  stroke-width: 1.5;
  stroke-dasharray: 2, 2;
  stroke: #333333;
}

.message-line {
  stroke: #333333;
}

.messageText {
  fill: #333333;
  stroke: none;
}

.message-label {
  fill: #333333;
  stroke: none;
}

.note {
  stroke: #aaaa33;
  fill: #fff5ad;
}

.noteText, .noteText > tspan {
  fill: black;
  stroke: none;
}

.note-text, .note-text > tspan {
  fill: black;
  stroke: none;
}

.activation {
  fill: #f4f4f4;
  stroke: #666666;
}

.loopLine {
  stroke: #9370DB;
  fill: none;
  stroke-width: 2px;
  stroke-dasharray: 2, 2;
}

.loopText {
  fill: #333333;
}

.labelBox {
  stroke: #9370DB;
  fill: #ECECFF;
}

.sequence-marker-filled {
  fill: #333333;
  stroke: #333333;
}

.sequence-marker-open {
  fill: none;
  stroke: #333333;
}

.sequence-marker-cross {
  stroke: #333333;
}

.sequence-number {
  fill: #333333;
}

.sequenceNumber-circle {
  fill: #333333;
  stroke: #333333;
}

.sequenceNumber {
  fill: white;
}

  </style>
  <defs>
    <marker id="arrow-filled" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="sequence-marker-filled" stroke-width="1"/>
    </marker>
    <marker id="arrow-open" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10" class="sequence-marker-open" stroke-width="1"/>
    </marker>
    <marker id="arrow-cross" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="12" markerHeight="12" orient="auto">
      <line x1="0" y1="0" x2="10" y2="10" class="sequence-marker-cross" stroke-width="2"/>
      <line x1="10" y1="0" x2="0" y2="10" class="sequence-marker-cross" stroke-width="2"/>
    </marker>
    <marker id="sequencenumber" refX="15" refY="15" markerWidth="60" markerHeight="40" orient="auto">
      <circle cx="15" cy="15" r="6" class="sequence-number"/>
    </marker>
  </defs>
  <g class="root">
    <g class="clusters">
      <g>
        <line x1="-20" y1="207" x2="399" y2="207" class="loopLine"/>
        <line x1="399" y1="207" x2="399" y2="389" class="loopLine"/>
        <line x1="-20" y1="389" x2="399" y2="389" class="loopLine"/>
        <line x1="-20" y1="207" x2="-20" y2="389" class="loopLine"/>
      </g>
      <polygon points="-10,207 40,207 40,220 32,227 -10,227" class="labelBox"/>
      <line x1="-20" y1="305" x2="399" y2="305" class="loopLine" stroke-dasharray="3,3"/>
      <g>
        <line x1="-20" y1="403" x2="399" y2="403" class="loopLine"/>
        <line x1="399" y1="403" x2="399" y2="487" class="loopLine"/>
        <line x1="-20" y1="487" x2="399" y2="487" class="loopLine"/>
        <line x1="-20" y1="403" x2="-20" y2="487" class="loopLine"/>
      </g>
      <polygon points="-10,403 40,403 40,416 32,423 -10,423" class="labelBox"/>
      <g>
        <line x1="-10" y1="109" x2="389" y2="109" class="loopLine"/>
        <line x1="389" y1="109" x2="389" y2="497" class="loopLine"/>
        <line x1="-10" y1="497" x2="389" y2="497" class="loopLine"/>
        <line x1="-10" y1="109" x2="-10" y2="497" class="loopLine"/>
      </g>
      <polygon points="0,109 50,109 50,122 42,129 0,129" class="labelBox"/>
      <line x1="75" y1="65" x2="75" y2="517" class="actor-line" stroke-width="0.5px"/>
      <line x1="304" y1="65" x2="304" y2="517" class="actor-line" stroke-width="0.5px"/>
    </g>
    <g class="edgePaths">
      <line x1="75" y1="163" x2="304" y2="163" class="messageLine0" marker-end="url(#arrow-filled)" stroke-width="2" stroke="none" style="fill: none;"/>
      <line x1="304" y1="261" x2="75" y2="261" class="messageLine0" style="fill: none;" stroke-width="2" marker-end="url(#arrow-filled)" stroke="none"/>
      <line x1="304" y1="359" x2="75" y2="359" class="messageLine0" stroke="none" stroke-width="2" style="fill: none;" marker-end="url(#arrow-filled)"/>
      <line x1="304" y1="457" x2="75" y2="457" class="messageLine0" stroke-width="2" marker-end="url(#arrow-filled)" style="fill: none;" stroke="none"/>
    </g>
    <g class="edgeLabels">
      <text x="15" y="220" class="labelText" text-anchor="middle" font-size="16">alt</text>
      <text x="189.5" y="225" class="loopText" font-size="16" text-anchor="middle">[is sick]</text>
      <text x="189.5" y="323" class="loopText" font-size="16" text-anchor="middle">[is well]</text>
      <text x="15" y="416" class="labelText" font-size="16" text-anchor="middle">opt</text>
      <text x="189.5" y="421" class="loopText" text-anchor="middle" font-size="16">[Extra response]</text>
      <text x="25" y="122" class="labelText" font-size="16" text-anchor="middle">loop</text>
      <text x="189.5" y="127" class="loopText" font-size="16" text-anchor="middle">[Daily query]</text>
      <text x="189.5" y="153" class="message-label" text-anchor="middle" font-size="16">Hello Bob, how are you?</text>
      <text x="189.5" y="251" class="message-label" font-size="16" text-anchor="middle">Not so good :(</text>
      <text x="189.5" y="349" class="message-label" text-anchor="middle" font-size="16">Feeling fresh like a daisy</text>
      <text x="189.5" y="447" class="message-label" font-size="16" text-anchor="middle">Thanks for asking</text>
    </g>
    <g class="nodes">

    </g>
    <g class="actor">
      <rect x="0" y="0" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1" fill="#eaeaea" stroke="#666"/>
      <text x="75" y="32.5" class="actor actor-box" text-anchor="middle" font-size="16" dominant-baseline="central">Alice</text>
    </g>
    <g class="actor">
      <rect x="229" y="0" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1" fill="#eaeaea" stroke="#666"/>
      <text x="304" y="32.5" class="actor actor-box" font-size="16" text-anchor="middle" dominant-baseline="central">Bob</text>
    </g>
    <g class="actor">
      <rect x="0" y="517" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1" fill="#eaeaea" stroke="#666"/>
      <text x="75" y="549.5" class="actor actor-box" font-size="16" text-anchor="middle" dominant-baseline="central">Alice</text>
    </g>
    <g class="actor">
      <rect x="229" y="517" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke="#666" stroke-width="1" fill="#eaeaea"/>
      <text x="304" y="549.5" class="actor actor-box" font-size="16" text-anchor="middle" dominant-baseline="central">Bob</text>
    </g>
  </g>
</svg>
