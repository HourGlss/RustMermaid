<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="865" height="572" viewBox="-50 -10 865 572" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.edge-label-bg {
  fill: rgba(232, 232, 232, 0.8);
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.sequence-title {
  fill: #333333;
}

.actor {
  stroke: #9370DB;
  fill: #ECECFF;
}

.actor-box {
  stroke: #9370DB;
  fill: #ECECFF;
}

/* Actor text - no stroke (avoid outlined appearance) */
text.actor, text.actor > tspan, text.actor-box, text.actor-label {
  fill: #333333;
  stroke: none;
}

.actor-line {
  stroke: #999999;
  stroke-width: 0.5px;
}

.messageLine0 {
  stroke-width: 1.5;
  stroke-dasharray: none;
  stroke: #333333;
}

.messageLine1 {
  stroke-width: 1.5;
  stroke-dasharray: 2, 2;
  stroke: #333333;
}

.message-line {
  stroke: #333333;
}

.messageText {
  fill: #333333;
  stroke: none;
}

.message-label {
  fill: #333333;
  stroke: none;
}

.note {
  stroke: #aaaa33;
  fill: #fff5ad;
}

.noteText, .noteText > tspan {
  fill: black;
  stroke: none;
}

.note-text, .note-text > tspan {
  fill: black;
  stroke: none;
}

.activation {
  fill: #f4f4f4;
  stroke: #666666;
}

.loopLine {
  stroke: #9370DB;
  fill: none;
  stroke-width: 2px;
  stroke-dasharray: 2, 2;
}

.loopText {
  fill: #333333;
}

.labelBox {
  stroke: #9370DB;
  fill: #ECECFF;
}

.sequence-marker-filled {
  fill: #333333;
  stroke: #333333;
}

.sequence-marker-open {
  fill: none;
  stroke: #333333;
}

.sequence-marker-cross {
  stroke: #333333;
}

.sequence-number {
  fill: #333333;
}

.sequenceNumber-circle {
  fill: #333333;
  stroke: #333333;
}

.sequenceNumber {
  fill: white;
}

  </style>
  <defs>
    <marker id="arrow-filled" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="sequence-marker-filled" stroke-width="1"/>
    </marker>
    <marker id="arrow-open" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10" class="sequence-marker-open" stroke-width="1"/>
    </marker>
    <marker id="arrow-cross" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="12" markerHeight="12" orient="auto">
      <line x1="0" y1="0" x2="10" y2="10" class="sequence-marker-cross" stroke-width="2"/>
      <line x1="10" y1="0" x2="0" y2="10" class="sequence-marker-cross" stroke-width="2"/>
    </marker>
    <marker id="sequencenumber" refX="15" refY="15" markerWidth="60" markerHeight="40" orient="auto">
      <circle cx="15" cy="15" r="6" class="sequence-number"/>
    </marker>
  </defs>
  <g class="root">
    <g class="clusters">
      <g>
        <line x1="401" y1="153" x2="571" y2="153" class="loopLine"/>
        <line x1="571" y1="153" x2="571" y2="257" class="loopLine"/>
        <line x1="401" y1="257" x2="571" y2="257" class="loopLine"/>
        <line x1="401" y1="153" x2="401" y2="257" class="loopLine"/>
      </g>
      <polygon points="411,153 461,153 461,166 453,173 411,173" class="labelBox"/>
      <line x1="75" y1="65" x2="75" y2="487" class="actor-line" stroke-width="0.5px"/>
      <line x1="286" y1="65" x2="286" y2="487" class="actor-line" stroke-width="0.5px"/>
      <line x1="486" y1="65" x2="486" y2="487" class="actor-line" stroke-width="0.5px"/>
    </g>
    <g class="edgePaths">
      <line x1="75" y1="109" x2="486" y2="109" class="messageLine0" style="fill: none;" stroke-width="2" stroke="none" marker-end="url(#arrow-filled)"/>
      <path d="M 486 207 L 526 207 L 526 237 L 486 237" class="message-line" stroke-width="1.5" fill="none" marker-end="url(#arrow-filled)"/>
      <line x1="486" y1="369" x2="75" y2="369" class="messageLine1" stroke-width="2" stroke="none" marker-end="url(#arrow-filled)" style="stroke-dasharray: 3, 3; fill: none;"/>
      <line x1="486" y1="413" x2="286" y2="413" class="messageLine0" marker-end="url(#arrow-filled)" stroke="none" stroke-width="2" style="fill: none;"/>
      <line x1="286" y1="457" x2="486" y2="457" class="messageLine1" style="stroke-dasharray: 3, 3; fill: none;" stroke="none" marker-end="url(#arrow-filled)" stroke-width="2"/>
    </g>
    <g class="edgeLabels">
      <text x="436" y="166" class="labelText" font-size="16" text-anchor="middle">loop</text>
      <text x="486" y="171" class="loopText" text-anchor="middle" font-size="16">[HealthCheck]</text>
      <text x="280.5" y="99" class="message-label" font-size="16" text-anchor="middle">Hello John, how are you?</text>
      <text x="531" y="222" class="message-label" text-anchor="start" font-size="16">Fight against hypochondria</text>
      <text x="280.5" y="359" class="message-label" text-anchor="middle" font-size="16">Great!</text>
      <text x="386" y="403" class="message-label" text-anchor="middle" font-size="16">How about you?</text>
      <text x="386" y="447" class="message-label" text-anchor="middle" font-size="16">Jolly good!</text>
    </g>
    <g class="nodes">

    </g>
    <g class="actor">
      <rect x="0" y="0" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1" fill="#eaeaea" stroke="#666"/>
      <text x="75" y="32.5" class="actor actor-box" dominant-baseline="central" font-size="16" text-anchor="middle">Alice</text>
    </g>
    <g class="actor">
      <rect x="211" y="0" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke="#666" fill="#eaeaea" stroke-width="1"/>
      <text x="286" y="32.5" class="actor actor-box" font-size="16" dominant-baseline="central" text-anchor="middle">Bob</text>
    </g>
    <g class="actor">
      <rect x="411" y="0" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke="#666" fill="#eaeaea" stroke-width="1"/>
      <text x="486" y="32.5" class="actor actor-box" text-anchor="middle" dominant-baseline="central" font-size="16">John</text>
    </g>
    <g class="note">
      <rect x="511" y="267" width="150" height="58" class="note" fill="#EDF2AE" stroke="#666"/>
      <text x="586" y="272" class="noteText" dy="1em" dominant-baseline="middle" text-anchor="middle" font-size="16" alignment-baseline="middle">Rational thoughts</text>
      <text x="586" y="291" class="noteText" alignment-baseline="middle" font-size="16" text-anchor="middle" dominant-baseline="middle" dy="1em">prevail...</text>
    </g>
    <g class="actor">
      <rect x="0" y="487" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke="#666" stroke-width="1" fill="#eaeaea"/>
      <text x="75" y="519.5" class="actor actor-box" font-size="16" dominant-baseline="central" text-anchor="middle">Alice</text>
    </g>
    <g class="actor">
      <rect x="211" y="487" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke="#666" stroke-width="1" fill="#eaeaea"/>
      <text x="286" y="519.5" class="actor actor-box" text-anchor="middle" font-size="16" dominant-baseline="central">Bob</text>
    </g>
    <g class="actor">
      <rect x="411" y="487" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1" fill="#eaeaea" stroke="#666"/>
      <text x="486" y="519.5" class="actor actor-box" text-anchor="middle" dominant-baseline="central" font-size="16">John</text>
    </g>
  </g>
</svg>
