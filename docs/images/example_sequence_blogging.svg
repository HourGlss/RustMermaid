<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1146" height="1044" viewBox="-50 -10 1146 1044" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.edge-label-bg {
  fill: rgba(232, 232, 232, 0.8);
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.sequence-title {
  fill: #333333;
}

.actor {
  stroke: #9370DB;
  fill: #ECECFF;
}

.actor-box {
  stroke: #9370DB;
  fill: #ECECFF;
}

/* Actor text - no stroke (avoid outlined appearance) */
text.actor, text.actor > tspan, text.actor-box, text.actor-label {
  fill: #333333;
  stroke: none;
}

.actor-line {
  stroke: #999999;
  stroke-width: 0.5px;
}

.messageLine0 {
  stroke-width: 1.5;
  stroke-dasharray: none;
  stroke: #333333;
}

.messageLine1 {
  stroke-width: 1.5;
  stroke-dasharray: 2, 2;
  stroke: #333333;
}

.message-line {
  stroke: #333333;
}

.messageText {
  fill: #333333;
  stroke: none;
}

.message-label {
  fill: #333333;
  stroke: none;
}

.note {
  stroke: #aaaa33;
  fill: #fff5ad;
}

.noteText, .noteText > tspan {
  fill: black;
  stroke: none;
}

.note-text, .note-text > tspan {
  fill: black;
  stroke: none;
}

.activation {
  fill: #f4f4f4;
  stroke: #666666;
}

.loopLine {
  stroke: #9370DB;
  fill: none;
  stroke-width: 2px;
  stroke-dasharray: 2, 2;
}

.loopText {
  fill: #333333;
}

.labelBox {
  stroke: #9370DB;
  fill: #ECECFF;
}

.sequence-marker-filled {
  fill: #333333;
  stroke: #333333;
}

.sequence-marker-open {
  fill: none;
  stroke: #333333;
}

.sequence-marker-cross {
  stroke: #333333;
}

.sequence-number {
  fill: #333333;
}

.sequenceNumber-circle {
  fill: #333333;
  stroke: #333333;
}

.sequenceNumber {
  fill: white;
}

  </style>
  <defs>
    <marker id="arrow-filled" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" class="sequence-marker-filled" stroke-width="1"/>
    </marker>
    <marker id="arrow-open" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10" class="sequence-marker-open" stroke-width="1"/>
    </marker>
    <marker id="arrow-cross" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="12" markerHeight="12" orient="auto">
      <line x1="0" y1="0" x2="10" y2="10" class="sequence-marker-cross" stroke-width="2"/>
      <line x1="10" y1="0" x2="0" y2="10" class="sequence-marker-cross" stroke-width="2"/>
    </marker>
    <marker id="sequencenumber" refX="15" refY="15" markerWidth="60" markerHeight="40" orient="auto">
      <circle cx="15" cy="15" r="6" class="sequence-number"/>
    </marker>
  </defs>
  <g class="root">
    <g class="clusters">
      <g>
        <line x1="-20" y1="623" x2="1066" y2="623" class="loopLine"/>
        <line x1="1066" y1="623" x2="1066" y2="929" class="loopLine"/>
        <line x1="-20" y1="929" x2="1066" y2="929" class="loopLine"/>
        <line x1="-20" y1="623" x2="-20" y2="929" class="loopLine"/>
      </g>
      <polygon points="-10,623 40,623 40,636 32,643 -10,643" class="labelBox"/>
      <line x1="-20" y1="845" x2="1066" y2="845" class="loopLine" stroke-dasharray="3,3"/>
      <g>
        <line x1="-10" y1="290" x2="1056" y2="290" class="loopLine"/>
        <line x1="1056" y1="290" x2="1056" y2="939" class="loopLine"/>
        <line x1="-10" y1="939" x2="1056" y2="939" class="loopLine"/>
        <line x1="-10" y1="290" x2="-10" y2="939" class="loopLine"/>
      </g>
      <polygon points="0,290 50,290 50,303 42,310 0,310" class="labelBox"/>
      <line x1="-10" y1="388" x2="1056" y2="388" class="loopLine" stroke-dasharray="3,3"/>
      <line x1="75" y1="65" x2="75" y2="959" class="actor-line" stroke-width="0.5px"/>
      <line x1="295" y1="65" x2="295" y2="959" class="actor-line" stroke-width="0.5px"/>
      <line x1="551" y1="65" x2="551" y2="959" class="actor-line" stroke-width="0.5px"/>
      <line x1="771" y1="65" x2="771" y2="959" class="actor-line" stroke-width="0.5px"/>
      <line x1="971" y1="65" x2="971" y2="959" class="actor-line" stroke-width="0.5px"/>
      <rect x="546" y="158" width="10" height="284" rx="1" ry="1" class="activation"/>
      <rect x="290" y="535" width="10" height="364" rx="1" ry="1" class="activation"/>
    </g>
    <g class="edgePaths">
      <line x1="75" y1="158" x2="551" y2="158" class="messageLine0" stroke-width="2" style="fill: none;" marker-end="url(#arrow-filled)" stroke="none"/>
      <line x1="551" y1="202" x2="971" y2="202" class="messageLine0" stroke="none" stroke-width="2" marker-end="url(#arrow-filled)" style="fill: none;"/>
      <line x1="971" y1="246" x2="551" y2="246" class="messageLine0" stroke="none" stroke-width="2" style="fill: none;" marker-end="url(#arrow-filled)"/>
      <line x1="551" y1="344" x2="75" y2="344" class="messageLine0" style="fill: none;" stroke-width="2" stroke="none" marker-end="url(#arrow-filled)"/>
      <line x1="551" y1="442" x2="75" y2="442" class="messageLine0" stroke-width="2" style="fill: none;" stroke="none" marker-end="url(#arrow-filled)"/>
      <line x1="75" y1="535" x2="295" y2="535" class="messageLine0" stroke-width="2" style="fill: none;" stroke="none" marker-end="url(#arrow-filled)"/>
      <line x1="295" y1="579" x2="971" y2="579" class="messageLine0" marker-end="url(#arrow-filled)" stroke="none" stroke-width="2" style="fill: none;"/>
      <path d="M 295 677 L 335 677 L 335 707 L 295 707" class="message-line" marker-end="url(#arrow-filled)" stroke-dasharray="3,3" stroke-width="1.5" fill="none"/>
      <path d="M 295 761 L 335 761 L 335 791 L 295 791" class="message-line" marker-end="url(#arrow-filled)" fill="none" stroke-dasharray="3,3" stroke-width="1.5"/>
      <line x1="295" y1="899" x2="75" y2="899" class="messageLine1" stroke-width="2" marker-end="url(#arrow-filled)" style="stroke-dasharray: 3, 3; fill: none;" stroke="none"/>
    </g>
    <g class="edgeLabels">
      <text x="15" y="636" class="labelText" font-size="16" text-anchor="middle">par</text>
      <text x="523" y="641" class="loopText" text-anchor="middle" font-size="16">[Notifications]</text>
      <text x="523" y="863" class="loopText" font-size="16" text-anchor="middle">[Response]</text>
      <text x="25" y="303" class="labelText" font-size="16" text-anchor="middle">alt</text>
      <text x="523" y="308" class="loopText" text-anchor="middle" font-size="16">[Credentials not found]</text>
      <text x="523" y="406" class="loopText" font-size="16" text-anchor="middle">[Credentials found]</text>
      <text x="313" y="148" class="message-label" font-size="16" text-anchor="middle">Logs in using credentials</text>
      <text x="761" y="192" class="message-label" font-size="16" text-anchor="middle">Query stored accounts</text>
      <text x="761" y="236" class="message-label" text-anchor="middle" font-size="16">Respond with query result</text>
      <text x="313" y="334" class="message-label" font-size="16" text-anchor="middle">Invalid credentials</text>
      <text x="313" y="432" class="message-label" text-anchor="middle" font-size="16">Successfully logged in</text>
      <text x="185" y="525" class="message-label" text-anchor="middle" font-size="16">Submit new post</text>
      <text x="633" y="569" class="message-label" text-anchor="middle" font-size="16">Store post data</text>
      <text x="340" y="692" class="message-label" text-anchor="start" font-size="16">Send mail to blog subscribers</text>
      <text x="340" y="776" class="message-label" font-size="16" text-anchor="start">Store in-site notifications</text>
      <text x="185" y="889" class="message-label" text-anchor="middle" font-size="16">Successfully posted</text>
    </g>
    <g class="nodes">

    </g>
    <g class="actor">
      <rect x="0" y="0" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1" fill="#eaeaea" stroke="#666"/>
      <text x="75" y="32.5" class="actor actor-box" text-anchor="middle" font-size="16" dominant-baseline="central">Web Browser</text>
    </g>
    <g class="actor">
      <rect x="220" y="0" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke="#666" stroke-width="1" fill="#eaeaea"/>
      <text x="295" y="32.5" class="actor actor-box" dominant-baseline="central" text-anchor="middle" font-size="16">Blog Service</text>
    </g>
    <g class="actor">
      <rect x="476" y="0" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1" fill="#eaeaea" stroke="#666"/>
      <text x="551" y="32.5" class="actor actor-box" font-size="16" text-anchor="middle" dominant-baseline="central">Account Service</text>
    </g>
    <g class="actor">
      <rect x="696" y="0" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke="#666" stroke-width="1" fill="#eaeaea"/>
      <text x="771" y="32.5" class="actor actor-box" dominant-baseline="central" font-size="16" text-anchor="middle">Mail Service</text>
    </g>
    <g class="actor">
      <rect x="896" y="0" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke="#666" stroke-width="1" fill="#eaeaea"/>
      <text x="971" y="32.5" class="actor actor-box" text-anchor="middle" font-size="16" dominant-baseline="central">Storage</text>
    </g>
    <g class="note">
      <rect x="50" y="75" width="946" height="39" class="note" stroke="#666" fill="#EDF2AE"/>
      <text x="523" y="80" class="noteText" dy="1em" text-anchor="middle" alignment-baseline="middle" dominant-baseline="middle" font-size="16">The user must be logged in to submit blog posts</text>
    </g>
    <g class="note">
      <rect x="50" y="452" width="946" height="39" class="note" stroke="#666" fill="#EDF2AE"/>
      <text x="523" y="457" class="noteText" alignment-baseline="middle" text-anchor="middle" dominant-baseline="middle" dy="1em" font-size="16">When the user is authenticated, they can now submit new posts</text>
    </g>
    <g class="actor">
      <rect x="0" y="959" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1" fill="#eaeaea" stroke="#666"/>
      <text x="75" y="991.5" class="actor actor-box" dominant-baseline="central" font-size="16" text-anchor="middle">Web Browser</text>
    </g>
    <g class="actor">
      <rect x="220" y="959" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke="#666" stroke-width="1" fill="#eaeaea"/>
      <text x="295" y="991.5" class="actor actor-box" dominant-baseline="central" text-anchor="middle" font-size="16">Blog Service</text>
    </g>
    <g class="actor">
      <rect x="476" y="959" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke="#666" stroke-width="1" fill="#eaeaea"/>
      <text x="551" y="991.5" class="actor actor-box" text-anchor="middle" dominant-baseline="central" font-size="16">Account Service</text>
    </g>
    <g class="actor">
      <rect x="696" y="959" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke="#666" fill="#eaeaea" stroke-width="1"/>
      <text x="771" y="991.5" class="actor actor-box" text-anchor="middle" dominant-baseline="central" font-size="16">Mail Service</text>
    </g>
    <g class="actor">
      <rect x="896" y="959" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke="#666" stroke-width="1" fill="#eaeaea"/>
      <text x="971" y="991.5" class="actor actor-box" text-anchor="middle" dominant-baseline="central" font-size="16">Storage</text>
    </g>
  </g>
</svg>
