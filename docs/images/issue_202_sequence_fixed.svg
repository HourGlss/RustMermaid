<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="865" height="543" viewBox="-50 -10 865 543" class="mermaid">
  <style>

.mermaid {
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.node rect,
.node polygon,
.node circle,
.node ellipse,
.node path {
  fill: #ECECFF;
  stroke: #9370DB;
  stroke-width: 1px;
}

.node line {
  stroke: #9370DB;
  stroke-width: 1px;
}

.node .label {
  fill: #333333;
}

.node text {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
}

.edge-path {
  fill: none;
  stroke: #333333;
  stroke-width: 1px;
}

.edge-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
}

.edge-label-bg {
  fill: rgba(232, 232, 232, 0.8);
}

.subgraph {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
}

.subgraph-title {
  fill: #333333;
  font-weight: bold;
}

.cluster rect {
  fill: #ffffde;
  stroke: #aaaa33;
  stroke-width: 1px;
  rx: 5px;
  ry: 5px;
}

.cluster-label {
  fill: #333333;
  font-family: trebuchet ms, verdana, arial, sans-serif;
  font-size: 16px;
  font-weight: bold;
}

marker path {
  fill: #333333;
  stroke: #333333;
}


.sequence-title {
  fill: #333333;
}

.actor {
  stroke: #9370DB;
  fill: #ECECFF;
}

.actor-box {
  stroke: #9370DB;
  fill: #ECECFF;
}

/* Actor text - no stroke (avoid outlined appearance) */
text.actor, text.actor > tspan, text.actor-box, text.actor-label {
  fill: #333333;
  stroke: none;
}

.actor-line {
  stroke: #999999;
  stroke-width: 0.5px;
}

.messageLine0 {
  stroke-width: 1.5;
  stroke-dasharray: none;
  stroke: #333333;
}

.messageLine1 {
  stroke-width: 1.5;
  stroke-dasharray: 2, 2;
  stroke: #333333;
}

.message-line {
  stroke: #333333;
}

.messageText {
  fill: #333333;
  stroke: none;
}

.message-label {
  fill: #333333;
  stroke: none;
}

.note {
  stroke: #aaaa33;
  fill: #fff5ad;
}

.noteText, .noteText > tspan {
  fill: black;
  stroke: none;
}

.note-text, .note-text > tspan {
  fill: black;
  stroke: none;
}

.activation {
  fill: #f4f4f4;
  stroke: #666666;
}

.loopLine {
  stroke: #9370DB;
  fill: none;
  stroke-width: 2px;
  stroke-dasharray: 2, 2;
}

.loopText {
  fill: #333333;
}

.labelBox {
  stroke: #9370DB;
  fill: #ECECFF;
}

.sequence-marker-filled {
  fill: #333333;
  stroke: #333333;
}

.sequence-marker-open {
  fill: none;
  stroke: #333333;
}

.sequence-marker-cross {
  stroke: #333333;
}

.sequence-number {
  fill: #333333;
}

.sequenceNumber-circle {
  fill: #333333;
  stroke: #333333;
}

.sequenceNumber {
  fill: white;
}

  </style>
  <defs>
    <marker id="arrow-filled" refX="7.9" refY="5" markerWidth="12" markerHeight="12" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M -1 0 L 10 5 L 0 10 z" class="sequence-marker-filled" stroke-width="1"/>
    </marker>
    <marker id="arrow-open" refX="7.9" refY="5" markerWidth="12" markerHeight="12" orient="auto-start-reverse" markerUnits="userSpaceOnUse">
      <path d="M -1 0 L 10 5 L 0 10" class="sequence-marker-open" stroke-width="1"/>
    </marker>
    <marker id="arrow-cross" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="12" markerHeight="12" orient="auto">
      <line x1="0" y1="0" x2="10" y2="10" class="sequence-marker-cross" stroke-width="2"/>
      <line x1="10" y1="0" x2="0" y2="10" class="sequence-marker-cross" stroke-width="2"/>
    </marker>
    <marker id="sequencenumber" refX="15" refY="15" markerWidth="60" markerHeight="40" orient="auto">
      <circle cx="15" cy="15" r="6" class="sequence-number"/>
    </marker>
  </defs>
  <g class="root">
    <g class="clusters">
      <g>
        <line x1="389" y1="153" x2="643" y2="153" class="loopLine"/>
        <line x1="643" y1="153" x2="643" y2="247" class="loopLine"/>
        <line x1="389" y1="247" x2="643" y2="247" class="loopLine"/>
        <line x1="389" y1="153" x2="389" y2="247" class="loopLine"/>
      </g>
      <polygon points="399,153 449,153 449,166 441,173 399,173" class="labelBox"/>
      <line x1="75" y1="65" x2="75" y2="458" class="actor-line" stroke-width="0.5px"/>
      <line x1="286" y1="65" x2="286" y2="458" class="actor-line" stroke-width="0.5px"/>
      <line x1="486" y1="65" x2="486" y2="458" class="actor-line" stroke-width="0.5px"/>
    </g>
    <g class="edgePaths">
      <line x1="75" y1="109" x2="486" y2="109" class="messageLine0" marker-end="url(#arrow-filled)" style="fill: none;" stroke="none" stroke-width="2"/>
      <path d="M 486 207 C 546 197 546 237 486 227" class="message-line" fill="none" marker-end="url(#arrow-filled)" stroke-width="1.5"/>
      <line x1="486" y1="340" x2="75" y2="340" class="messageLine1" stroke-width="2" marker-end="url(#arrow-filled)" style="stroke-dasharray: 3, 3; fill: none;" stroke="none"/>
      <line x1="486" y1="384" x2="286" y2="384" class="messageLine0" stroke-width="2" stroke="none" marker-end="url(#arrow-filled)" style="fill: none;"/>
      <line x1="286" y1="428" x2="486" y2="428" class="messageLine1" style="stroke-dasharray: 3, 3; fill: none;" stroke-width="2" marker-end="url(#arrow-filled)" stroke="none"/>
    </g>
    <g class="edgeLabels">
      <text x="424" y="166" class="labelText" font-size="16" text-anchor="middle">loop</text>
      <text x="541" y="171" class="loopText" text-anchor="middle" font-size="16">[Healthcheck]</text>
      <text x="280.5" y="99" class="message-label" text-anchor="middle" font-size="16">Hello John, how are you?</text>
      <text x="516" y="193" class="message-label" text-anchor="middle" font-size="16">Fight against hypochondria</text>
      <text x="280.5" y="330" class="message-label" text-anchor="middle" font-size="16">Great!</text>
      <text x="386" y="374" class="message-label" text-anchor="middle" font-size="16">How about you?</text>
      <text x="386" y="418" class="message-label" font-size="16" text-anchor="middle">Jolly good!</text>
    </g>
    <g class="nodes">

    </g>
    <g class="actor">
      <rect x="0" y="0" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke="#666" stroke-width="1" fill="#eaeaea"/>
      <text x="75" y="32.5" class="actor actor-box" text-anchor="middle" dominant-baseline="central" font-size="16">Alice</text>
    </g>
    <g class="actor">
      <rect x="211" y="0" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1" fill="#eaeaea" stroke="#666"/>
      <text x="286" y="32.5" class="actor actor-box" font-size="16" text-anchor="middle" dominant-baseline="central">Bob</text>
    </g>
    <g class="actor">
      <rect x="411" y="0" width="150" height="65" rx="3" ry="3" class="actor actor-box" stroke-width="1" fill="#eaeaea" stroke="#666"/>
      <text x="486" y="32.5" class="actor actor-box" dominant-baseline="central" font-size="16" text-anchor="middle">John</text>
    </g>
    <g class="note">
      <rect x="511" y="257" width="254" height="39" class="note" fill="#EDF2AE" stroke="#666"/>
      <text x="638" y="262" class="noteText" text-anchor="middle" dy="1em" font-size="16" dominant-baseline="middle" alignment-baseline="middle">Rational thoughts prevail!</text>
    </g>
    <g class="actor">
      <rect x="0" y="458" width="150" height="65" rx="3" ry="3" class="actor actor-box" fill="#eaeaea" stroke="#666" stroke-width="1"/>
      <text x="75" y="490.5" class="actor actor-box" font-size="16" text-anchor="middle" dominant-baseline="central">Alice</text>
    </g>
    <g class="actor">
      <rect x="211" y="458" width="150" height="65" rx="3" ry="3" class="actor actor-box" fill="#eaeaea" stroke="#666" stroke-width="1"/>
      <text x="286" y="490.5" class="actor actor-box" text-anchor="middle" dominant-baseline="central" font-size="16">Bob</text>
    </g>
    <g class="actor">
      <rect x="411" y="458" width="150" height="65" rx="3" ry="3" class="actor actor-box" fill="#eaeaea" stroke="#666" stroke-width="1"/>
      <text x="486" y="490.5" class="actor actor-box" text-anchor="middle" dominant-baseline="central" font-size="16">John</text>
    </g>
  </g>
</svg>
